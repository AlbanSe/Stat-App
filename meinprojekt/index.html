<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StatLearn Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0D17;--bg2:#12152A;--bg3:#1A1F38;--bg4:#222847;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#E8EBF8;--text2:#8B91B5;--text3:#555A7A;
  --purple:#7C6FED;--purple-l:#A89AF5;--purple-d:#3D3580;
  --green:#36D399;--green-l:#6EE7B7;--green-d:#0D5C3F;
  --amber:#FBBF24;--amber-l:#FDE68A;--amber-d:#78350F;
  --red:#F87171;--red-d:#7F1D1D;
  --blue:#60A5FA;--pink:#F472B6;--teal:#2DD4BF;
  --r:12px;--rs:8px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button{font-family:'Inter',sans-serif;cursor:pointer}
input,textarea{font-family:'Inter',sans-serif}

/* NAV */
.nav{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:1rem;position:sticky;top:0;z-index:200}
.logo{font-weight:800;font-size:18px;background:linear-gradient(135deg,var(--purple-l),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-tabs{display:flex;gap:4px;margin-left:auto}
.nav-tab{padding:6px 14px;border-radius:20px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px}
.nav-tab:hover{background:var(--bg3);color:var(--text)}
.nav-tab.active{background:var(--purple);color:#fff}
.streak-badge{display:flex;align-items:center;gap:5px;background:var(--amber-d);border:1px solid var(--amber);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;color:var(--amber-l)}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);padding:1.25rem 0.75rem;flex-shrink:0;overflow-y:auto}
.main-area{flex:1;overflow-y:auto;padding:1.5rem}

/* SIDEBAR */
.sb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:0 8px;margin:1rem 0 6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);color:var(--text2);font-size:13px;cursor:pointer;transition:.15s;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:rgba(124,111,237,0.2);color:var(--purple-l)}
.sb-item .prog-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-left:auto}
.sb-item .prog-dot.done{background:var(--green)}
.sb-item .prog-dot.partial{background:var(--amber)}
.sb-item .prog-dot.none{background:var(--border2)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem}
.card-sm{padding:.875rem}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.5rem}
.stat-card{background:var(--bg3);border-radius:var(--r);padding:1.25rem;text-align:center}
.stat-val{font-size:32px;font-weight:800;line-height:1}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:6px}
.hero-banner{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.5rem}
.hero-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--teal));display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.hero-title{font-size:20px;font-weight:700;margin-bottom:4px}
.hero-sub{font-size:14px;color:var(--text2)}
.xp-bar-wrap{margin-top:10px}
.xp-bar-bg{height:8px;background:var(--bg4);border-radius:4px}
.xp-bar-fill{height:8px;background:linear-gradient(90deg,var(--purple),var(--purple-l));border-radius:4px;transition:.5s}
.xp-label{font-size:11px;color:var(--text3);margin-top:4px}

/* TOPICS */
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.topic-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.topic-card:hover{border-color:var(--purple);transform:translateY(-2px)}
.topic-card.locked{opacity:.5;cursor:not-allowed}
.topic-card.completed{border-color:var(--green-d)}
.topic-icon{font-size:22px;margin-bottom:10px}
.topic-name{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.4}
.topic-meta{font-size:11px;color:var(--text3)}
.topic-prog{height:3px;background:var(--bg4);border-radius:2px;margin-top:10px}
.topic-prog-fill{height:3px;border-radius:2px;background:var(--purple)}
.topic-prog-fill.done{background:var(--green)}
.badge-done{position:absolute;top:10px;right:10px;background:var(--green-d);color:var(--green-l);font-size:10px;font-weight:700;border-radius:4px;padding:2px 6px}

/* QUIZ */
.q-meta{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.pill{font-size:11px;font-weight:600;border-radius:20px;padding:3px 10px}
.pill-purple{background:rgba(124,111,237,.2);color:var(--purple-l)}
.pill-green{background:rgba(54,211,153,.15);color:var(--green)}
.pill-amber{background:rgba(251,191,36,.15);color:var(--amber)}
.pill-red{background:rgba(248,113,113,.15);color:var(--red)}
.q-text{font-size:17px;line-height:1.65;margin-bottom:1.25rem;font-weight:500}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{padding:13px 16px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;cursor:pointer;transition:.15s;text-align:left;line-height:1.5}
.opt:hover:not(:disabled){border-color:var(--purple);background:rgba(124,111,237,.1)}
.opt.correct{border-color:var(--green);background:rgba(54,211,153,.12);color:var(--green-l)}
.opt.wrong{border-color:var(--red);background:rgba(248,113,113,.1);color:var(--red)}
.opt.show-correct{border-color:var(--green);background:rgba(54,211,153,.07)}
.opt:disabled{cursor:default}
.explanation{margin-top:1rem;padding:1rem;border-radius:var(--rs);background:var(--bg3);border-left:3px solid var(--purple);font-size:14px;line-height:1.7;color:var(--text2);display:none}
.explanation.show{display:block}

/* TIMER */
.timer{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text)}
.timer.warning{color:var(--amber)}
.timer.danger{color:var(--red)}
.progress-ring-wrap{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
.prog-bar{flex:1;height:6px;background:var(--bg4);border-radius:3px}
.prog-fill{height:6px;border-radius:3px;background:linear-gradient(90deg,var(--purple),var(--teal));transition:.3s}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;gap:12px;max-height:440px;overflow-y:auto;padding-right:4px}
.msg{padding:12px 16px;border-radius:var(--r);font-size:14px;line-height:1.7;max-width:88%}
.msg.ai{background:var(--bg3);border:1px solid var(--border);color:var(--text);align-self:flex-start}
.msg.user{background:var(--purple);color:#fff;align-self:flex-end;border-radius:var(--r) var(--r) 4px var(--r)}
.chat-input-row{display:flex;gap:8px;margin-top:12px}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 14px;color:var(--text);font-size:14px;outline:none}
.chat-input:focus{border-color:var(--purple)}
.chat-input::placeholder{color:var(--text3)}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;transition:.15s;white-space:nowrap}
.chip:hover{border-color:var(--purple);color:var(--purple-l)}

/* VIZ */
canvas{max-width:100%;border-radius:var(--rs)}
.viz-controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:1rem}
.viz-label{font-size:13px;color:var(--text2);min-width:80px}
.slider-row{display:flex;align-items:center;gap:10px;flex:1}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:var(--bg4);outline:none;flex:1}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--purple);cursor:pointer}
.val-badge{font-size:13px;font-weight:600;color:var(--purple-l);min-width:40px;text-align:right}

/* BUTTONS */
.btn{padding:10px 20px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:8px}
.btn:hover{border-color:var(--border2);background:var(--bg4)}
.btn-primary{background:var(--purple);border-color:var(--purple);color:#fff}
.btn-primary:hover{opacity:.88;background:var(--purple)}
.btn-green{background:var(--green-d);border-color:var(--green);color:var(--green-l)}
.btn-sm{padding:7px 14px;font-size:13px}
.btn-row{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap}

/* RESULTS */
.result-ring{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:32px;font-weight:800;border:6px solid var(--green);margin:0 auto 1rem}
.result-center{text-align:center;padding:2rem}

/* LOADING */
.loading{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:14px;padding:.75rem 0}
.spin{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* SECTION */
.section-hd{margin-bottom:1.25rem}
.section-title{font-size:22px;font-weight:800;margin-bottom:4px}
.section-sub{font-size:14px;color:var(--text2)}

/* FLASHCARD */
.fc-scene{perspective:1200px;height:220px;cursor:pointer}
.fc-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:.55s}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;border:1px solid var(--border)}
.fc-front{background:var(--bg2)}
.fc-back{background:var(--bg3);border-color:var(--purple-d);transform:rotateY(180deg)}
.fc-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:12px}
.fc-text{font-size:15px;line-height:1.6;color:var(--text)}

/* TABS inside section */
.inner-tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.inner-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:.15s}
.inner-tab:hover{background:var(--bg3);color:var(--text)}
.inner-tab.active{background:var(--purple);border-color:var(--purple);color:#fff}

/* TOOLTIP */
.tooltip-wrap{position:relative;display:inline-block}
.tooltip{position:absolute;bottom:calc(100%+6px);left:50%;transform:translateX(-50%);background:#1A1F38;border:1px solid var(--border2);padding:6px 10px;border-radius:var(--rs);font-size:12px;white-space:nowrap;color:var(--text);pointer-events:none;opacity:0;transition:.15s;z-index:100}
.tooltip-wrap:hover .tooltip{opacity:1}

/* EXAM */
.q-counter{font-size:13px;color:var(--text2);margin-bottom:.5rem}
.score-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:1.5rem}

/* MISC */
.divider{height:1px;background:var(--border);margin:1.25rem 0}
.empty{text-align:center;padding:2.5rem;color:var(--text3)}
.empty i{font-size:40px;display:block;margin-bottom:.75rem;opacity:.3}
.text-green{color:var(--green)}
.text-amber{color:var(--amber)}
.text-red{color:var(--red)}
.text-purple{color:var(--purple-l)}
@media(max-width:680px){.sidebar{display:none}.layout{flex-direction:column}}
</style>
</head>
<body>

<div class="nav">
  <span class="logo">StatLearn Pro</span>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="goPage('dashboard')" id="nt-dashboard"><i class="ti ti-home" aria-hidden="true"></i> Dashboard</button>
    <button class="nav-tab" onclick="goPage('learn')" id="nt-learn"><i class="ti ti-book" aria-hidden="true"></i> Lernen</button>
    <button class="nav-tab" onclick="goPage('viz')" id="nt-viz"><i class="ti ti-chart-line" aria-hidden="true"></i> Visualisierungen</button>
    <button class="nav-tab" onclick="goPage('exam')" id="nt-exam"><i class="ti ti-certificate" aria-hidden="true"></i> Prüfung</button>
    <button class="nav-tab" onclick="goPage('chat')" id="nt-chat"><i class="ti ti-message-circle" aria-hidden="true"></i> KI-Tutor</button>
  </div>
  <div class="streak-badge" style="margin-left:.75rem"><i class="ti ti-flame" aria-hidden="true"></i><span id="streak-num">0</span></div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sb-label">Kapitel</div>
    <div id="sb-topics"></div>
  </div>
  <div class="main-area" id="main"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
/* ===================== DATA ===================== */
const TOPICS = [
  {id:'intro',n:1,icon:'📖',label:'Einführung & Statistical Modeling',keys:'supervised vs unsupervised, prediction vs inference, parametric vs non-parametric, flexibility, interpretability',xp:80},
  {id:'bias-var',n:2,icon:'⚖️',label:'Modellgüte & Bias-Varianz-Tradeoff',keys:'MSE, training error, test error, bias, variance, overfitting, underfitting, model complexity',xp:100},
  {id:'classifiers',n:3,icon:'🧮',label:'Naive Bayes, KNN & Logistische Regression',keys:'Bayes theorem, naive Bayes, K-nearest neighbors, logistic regression, sigmoid, decision boundary, classification error, sensitivity, specificity',xp:120},
  {id:'simple-lm',n:4,icon:'📈',label:'Einfache lineare Regression',keys:'OLS, least squares, slope, intercept, RSE, R-squared, t-statistic, p-value, confidence interval',xp:90},
  {id:'multi-lm',n:5,icon:'📉',label:'Multiple lineare Regression',keys:'multiple predictors, F-statistic, collinearity, VIF, adjusted R-squared, model selection, partial effect',xp:110},
  {id:'qualitative',n:6,icon:'🏷️',label:'Qualitative Prädiktoren',keys:'dummy variables, one-hot encoding, reference category, contrast coding, intercept interpretation',xp:70},
  {id:'polynomial',n:7,icon:'〰️',label:'Regression mit Polynomtermen',keys:'polynomial regression, quadratic, cubic terms, nonlinear relationships, overfitting with high degree',xp:80},
  {id:'interaction',n:8,icon:'🔗',label:'Regressions-Interaktionsterme',keys:'interaction terms, synergy, multiplicative model, hierarchical principle, moderation',xp:80},
  {id:'problems',n:9,icon:'⚠️',label:'Potentielle Probleme',keys:'heteroscedasticity, non-linearity, outliers, high leverage, multicollinearity, residual plots, Cook distance',xp:100},
  {id:'cv',n:10,icon:'🔄',label:'Resampling: Kreuzvalidierung',keys:'LOOCV, k-fold cross-validation, validation set, test error estimation, hyperparameter tuning',xp:110},
  {id:'bootstrap',n:11,icon:'🔃',label:'Resampling: Bootstrap',keys:'bootstrap sampling, standard error, confidence intervals, resampling with replacement, parameter uncertainty',xp:90},
  {id:'highdim',n:12,icon:'🧊',label:'Hochdimensionale Datenstrukturen',keys:'curse of dimensionality, p >> n, sparsity, regularization, feature selection, high-dimensional inference',xp:100},
  {id:'lasso',n:13,icon:'✂️',label:'Lasso-Regression',keys:'L1 regularization, sparsity, lambda, ridge vs lasso, elastic net, variable selection, coefficient shrinkage',xp:120},
];

/* ===================== STATE ===================== */

const ST = JSON.parse(localStorage.getItem('slp_state') || 'null') || {
  xp:0, streak:0, lastDay:'', progress:{}, examScores:[], chatHistory:[], flashStats:{}, badges:[]
};
function save(){localStorage.setItem('slp_state', JSON.stringify(ST))}

function addXP(n){
  ST.xp += n;
  const today = new Date().toDateString();
  if(ST.lastDay !== today){ ST.streak++; ST.lastDay = today; }
  save(); updateStreakBadge();
}
function updateStreakBadge(){document.getElementById('streak-num').textContent = ST.streak}
function topicProgress(id){ return ST.progress[id] || {score:0, attempts:0, mastered:false} }
function setTopicProg(id, score){
  const p = topicProgress(id);
  p.attempts++;
  p.score = Math.max(p.score, score);
  p.mastered = p.score >= 80;
  ST.progress[id] = p;
  save(); renderSidebar();
}

/* ===================== PAGES ===================== */
let currentPage = 'dashboard';
let currentTopic = TOPICS[0];

function goPage(p){
  currentPage = p;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  const nt = document.getElementById('nt-'+p);
  if(nt) nt.classList.add('active');
  render();
}

function render(){
  if(currentPage==='dashboard') renderDashboard();
  else if(currentPage==='learn') renderLearn();
  else if(currentPage==='viz') renderViz();
  else if(currentPage==='exam') renderExam();
  else if(currentPage==='chat') renderChat();
}

/* ---- SIDEBAR ---- */
function renderSidebar(){
  const sb = document.getElementById('sb-topics');
  sb.innerHTML = TOPICS.map(t=>{
    const p = topicProgress(t.id);
    const dot = p.mastered ? 'done' : p.attempts>0 ? 'partial' : 'none';
    return `<button class="sb-item${currentTopic.id===t.id?' active':''}" onclick="selectTopic('${t.id}')">
      <span>${t.icon}</span>
      <span style="flex:1;font-size:12px;line-height:1.35">${t.label}</span>
      <span class="prog-dot ${dot}"></span>
    </button>`;
  }).join('');
}

function selectTopic(id){
  currentTopic = TOPICS.find(t=>t.id===id);
  renderSidebar();
  if(currentPage==='dashboard') goPage('learn');
  else render();
}

/* ===================== DASHBOARD ===================== */
function renderDashboard(){
  const main = document.getElementById('main');
  const totalMastered = TOPICS.filter(t=>topicProgress(t.id).mastered).length;
  const totalAttempted = TOPICS.filter(t=>topicProgress(t.id).attempts>0).length;
  const lvl = Math.floor(ST.xp/200)+1;
  const xpInLevel = ST.xp % 200;
  const avgScore = Object.values(ST.progress).length
    ? Math.round(Object.values(ST.progress).reduce((s,p)=>s+p.score,0)/Object.values(ST.progress).length) : 0;

  main.innerHTML = `
  <div class="hero-banner">
    <div class="hero-avatar">🎓</div>
    <div style="flex:1">
      <div class="hero-title">Willkommen zurück!</div>
      <div class="hero-sub">Level ${lvl} · ${ST.xp} XP gesamt · Prüfung meistern! 🚀</div>
      <div class="xp-bar-wrap">
        <div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${xpInLevel/2}%"></div></div>
        <div class="xp-label">${xpInLevel}/200 XP bis Level ${lvl+1}</div>
      </div>
    </div>
    <div style="text-align:center">
      <div style="font-size:36px;font-weight:800;color:var(--amber)">${ST.streak}</div>
      <div style="font-size:12px;color:var(--text3)">Tage Streak 🔥</div>
    </div>
  </div>

  <div class="dash-grid">
    <div class="stat-card"><div class="stat-val text-purple">${totalMastered}/${TOPICS.length}</div><div class="stat-lbl">Themen gemeistert</div></div>
    <div class="stat-card"><div class="stat-val text-green">${ST.xp}</div><div class="stat-lbl">XP verdient</div></div>
    <div class="stat-card"><div class="stat-val text-amber">${avgScore || '–'}</div><div class="stat-lbl">Ø Score</div></div>
    <div class="stat-card"><div class="stat-val text-purple">${ST.examScores.length}</div><div class="stat-lbl">Prüfungs-Runs</div></div>
  </div>

  <div style="margin-bottom:1.25rem">
    <div class="section-title" style="font-size:17px;margin-bottom:1rem">Alle Kapitel</div>
    <div class="topic-grid">
      ${TOPICS.map(t=>{
        const p = topicProgress(t.id);
        return `<div class="topic-card${p.mastered?' completed':''}" onclick="selectTopic('${t.id}')">
          ${p.mastered ? '<span class="badge-done">✓ Gemeistert</span>' : ''}
          <div class="topic-icon">${t.icon}</div>
          <div class="topic-name">${t.label}</div>
          <div class="topic-meta">${t.xp} XP · ${p.attempts} Versuche</div>
          <div class="topic-prog"><div class="topic-prog-fill${p.mastered?' done':''}" style="width:${p.score}%"></div></div>
        </div>`;
      }).join('')}
    </div>
  </div>

  ${ST.examScores.length ? `
  <div class="card">
    <div style="font-size:15px;font-weight:600;margin-bottom:12px">Letzte Prüfungs-Ergebnisse</div>
    ${ST.examScores.slice(-4).reverse().map((s,i)=>`
      <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)">

function renderQuizBody(b){

    <button class="btn btn-sm" onclick="genQuestion('hard')">Schwer</button>
  </div>`;
}

async function genQuestion(diff='medium'){
  quizState.answered = false;
  const qa = document.getElementById('q-area');
  if(!qa) return;
  qa.innerHTML = `<div class="loading"><div class="spin"></div> KI generiert Frage…</div>`;
  const prompt = `Du bist ein Statistikprofessor. Erstelle genau eine Multiple-Choice-Prüfungsfrage (4 Optionen A–D) für das Thema "${currentTopic.label}" aus dem Buch ISLP (An Introduction to Statistical Learning with Python).
Schlüsselkonzepte: ${currentTopic.keys}
Schwierigkeit: ${diff==='easy'?'einfach (Definitionen)':diff==='hard'?'schwer (komplexe Analyse, mathematische Details)':'mittel (Konzeptverständnis)'}
Antwort NUR als JSON:
{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"correct":0,"explanation":"2-3 Sätze Erklärung auf Deutsch","difficulty":"${diff}"}`;
  try{
    const r = await apicall(prompt, 900);
    const q = JSON.parse(r.replace(/```json|```/g,'').trim());
    quizState.q = q; quizState.answered = false;
    showQuestion(q, qa);
  }catch(e){qa.innerHTML=`<div class="empty"><i class="ti ti-wifi-off" aria-hidden="true"></i><p>Fehler – erneut versuchen</p></div>`}
}

function showQuestion(q, qa){
  const dCls = q.difficulty==='easy'?'pill-green':q.difficulty==='hard'?'pill-red':'pill-amber';
  const dLbl = q.difficulty==='easy'?'Leicht':q.difficulty==='hard'?'Schwer':'Mittel';
  qa.innerHTML = `
  <div class="card">
    <div class="q-meta"><span class="pill ${dCls}">${dLbl}</span></div>
    <div class="q-text">${q.question}</div>
    <div class="opts">
      ${q.options.map((o,i)=>`<button class="opt" id="qo${i}" onclick="answerQ(${i})">${o}</button>`).join('')}
    </div>
    <div class="explanation" id="qexp"><strong>💡 Erklärung:</strong> ${q.explanation}</div>
  </div>`;
}

function answerQ(idx){
  if(quizState.answered) return;
  quizState.answered = true;
  const q = quizState.q;
  const correct = idx === q.correct;
  q.options.forEach((_,i)=>{
    const b = document.getElementById('qo'+i);
    b.disabled = true;
    if(i===q.correct) b.classList.add(correct||i!==idx?'correct':'show-correct');
    else if(i===idx) b.classList.add('wrong');
  });
  document.getElementById('qexp').classList.add('show');
  if(correct){ addXP(correct?20:5); }
  const row = document.querySelector('.btn-row');
  if(row){ const nb=document.createElement('button');nb.className='btn btn-primary';nb.innerHTML='<i class="ti ti-arrow-right" aria-hidden="true"></i> Nächste';nb.onclick=()=>genQuestion(q.difficulty);row.prepend(nb); }
}

function updateBiasGame(){
  const c = parseInt(document.getElementById('game-complexity').value);
  document.getElementById('game-c-val').textContent = c;

  const bias2 = Math.max(0.05, 2.5-0.13*c+0.002*c*c);
  const variance = 0.05+0.008*c+0.012*c*c;
  const mse = bias2+variance+0.1;

  document.getElementById('game-mse').textContent = mse.toFixed(2);
}

function submitBiasGame(){
  const c = parseInt(document.getElementById('game-complexity').value);
  const optimal = 8;

  const diff = Math.abs(c-optimal);
  const fb = document.getElementById('game-feedback');

  if(diff<=1){
    addXP(30);
    fb.innerHTML = '<span class="text-green">✓ Perfekt! Du hast den optimalen Bereich gefunden (+30 XP).</span>';
  }else if(diff<=3){
    addXP(15);
    fb.innerHTML = '<span class="text-amber">Fast richtig. Das Optimum liegt ungefähr bei Komplexität 8 (+15 XP).</span>';
  }else{
    fb.innerHTML = '<span class="text-red">Noch zu weit entfernt. Suche das Minimum des Testfehlers.</span>';
  }
}

function checkDummyGame(){
  const val = parseInt(document.getElementById('dummy-answer').value);
  const fb = document.getElementById('dummy-feedback');

  if(val===2){
    addXP(20);
    fb.innerHTML = '<span class="text-green">✓ Richtig! Für k Kategorien benötigt man k−1 Dummy-Variablen (+20 XP).</span>';
  }else{
    fb.innerHTML = '<span class="text-red">✗ Nicht ganz. Bei drei Kategorien brauchst du zwei Dummy-Variablen.</span>';
  }
}

function initBVChart(){
  const ctx = document.getElementById('bv-chart');
  if(!ctx) return;
  const complexity = Array.from({length:20},(_,i)=>i+1);
  const bias2 = complexity.map(c=>Math.max(0.05, 2.5-0.13*c+0.002*c*c));
  const variance = complexity.map(c=>0.05+0.008*c+0.012*c*c);
  const mse = complexity.map((c,i)=>bias2[i]+variance[i]+0.1);
  bvChart = new Chart(ctx,{
    type:'line',
    data:{labels:complexity.map(c=>'k='+c),datasets:[
      {label:'Bias²',data:bias2,borderColor:'#F87171',backgroundColor:'rgba(248,113,113,.08)',tension:.4,fill:true},
      {label:'Varianz',data:variance,borderColor:'#60A5FA',backgroundColor:'rgba(96,165,250,.08)',tension:.4,fill:true},
      {label:'Test-MSE',data:mse,borderColor:'#A89AF5',borderWidth:2.5,backgroundColor:'transparent',tension:.4}
    ]},
    options:{responsive:true,plugins:{legend:{labels:{color:'#8B91B5',font:{size:12}}}},scales:{x:{ticks:{color:'#555A7A'},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#555A7A'},grid:{color:'rgba(255,255,255,.04)'}}},animation:{duration:400}}
  });
  updateBV();
}

function updateBV(){
  const c = parseInt(document.getElementById('sl-complexity').value);
  document.getElementById('vb-c').textContent = c;
  const bias2 = Math.max(0.05, 2.5-0.13*c+0.002*c*c);

  const mse = bias2+variance+0.1;
  document.getElementById('bv-bias').textContent = bias2.toFixed(2);
  document.getElementById('bv-var').textContent = variance.toFixed(2);

  document.getElementById('bv-label').textContent = lbl;
  if(bvChart){
    bvChart.data.datasets[0].data.forEach((_,i)=>{});
    const marker = bvChart.data.datasets[2].data.indexOf(Math.min(...bvChart.data.datasets[2].data));
    bvChart.options.plugins.annotation = {};
    bvChart.update('none');
    bvChart.data.datasets.forEach(ds=>{ if(ds.pointRadius !== undefined) ds.pointRadius = ds.data.map((_,i)=>i===c-1?6:0); });

}

/* LASSO VIZ */
function renderLassoViz(b){
  b.innerHTML = `
  <div class="card">
    <div class="viz-controls">
      <span class="viz-label">Lambda (λ)</span>
      <div class="slider-row"><input type="range" min="0" max="100" value="20" step="1" id="sl-lambda" oninput="updateLasso()"><span class="val-badge" id="vb-l">0.20</span></div>
    </div>
    <canvas id="lasso-chart" height="240"></canvas>
    <div id="lasso-info" style="margin-top:.75rem;font-size:13px;color:var(--text2);text-align:center"></div>
  </div>`;
  initLassoChart();
}

function initLassoChart(){
  const ctx = document.getElementById('lasso-chart');
  if(!ctx) return;
  const lams = Array.from({length:50},(_,i)=>i*2);
  const coefs = [
    {label:'β₁ (Wichtig)',color:'#7C6FED',init:2.5},
    {label:'β₂ (Mittel)',color:'#36D399',init:1.2},
    {label:'β₃ (Klein)',color:'#FBBF24',init:0.6},
    {label:'β₄ (Irrelevant)',color:'#F87171',init:0.15},
  ];
  lassChart = new Chart(ctx,{
    type:'line',
    data:{labels:lams.map(l=>(l/100).toFixed(2)),datasets:coefs.map(c=>({
      label:c.label,
      data:lams.map(l=>Math.max(0,c.init-l/100*c.init*1.1)),
      borderColor:c.color,backgroundColor:'transparent',tension:.3,borderWidth:2
    }))},
    options:{responsive:true,plugins:{legend:{labels:{color:'#8B91B5',font:{size:12}}}},scales:{x:{title:{display:true,text:'λ',color:'#555A7A'},ticks:{color:'#555A7A',maxTicksLimit:8},grid:{color:'rgba(255,255,255,.04)'}},y:{title:{display:true,text:'Koeffizient',color:'#555A7A'},ticks:{color:'#555A7A'},grid:{color:'rgba(255,255,255,.04)'}}},animation:{duration:300}}
  });
  updateLasso();
}

function updateLasso(){
  const lv = parseInt(document.getElementById('sl-lambda').value);
  document.getElementById('vb-l').textContent = (lv/100).toFixed(2);
  const inits = [2.5,1.2,0.6,0.15];
  const vals = inits.map(v=>Math.max(0,v-lv/100*v*1.1));
  const zeroed = vals.filter(v=>v===0).length;
  document.getElementById('lasso-info').textContent = `Bei λ=${(lv/100).toFixed(2)}: ${zeroed} Koeffizient${zeroed===1?'':'en'} auf 0 gesetzt — Lasso wählt automatisch Features aus`;
  if(lassChart){
    lassChart.data.datasets.forEach((ds,i)=>{
      ds.data = Array.from({length:50},(_,j)=>Math.max(0,inits[i]-j*2/100*inits[i]*1.1));
    });
    lassChart.update('none');
  }
}

/* CV VIZ */
function renderCVViz(b){
  b.innerHTML = `
  <div class="card">
    <div class="viz-controls">
      <span class="viz-label">k-Folds</span>
      <div class="slider-row"><input type="range" min="2" max="20" value="5" step="1" id="sl-k" oninput="updateCV()"><span class="val-badge" id="vb-k">5</span></div>
    </div>
    <canvas id="cv-chart" height="220"></canvas>
    <div id="cv-info" style="margin-top:.75rem;font-size:13px;text-align:center;color:var(--text2)"></div>
  </div>`;
  initCVChart();
}

function initCVChart(){
  const ctx = document.getElementById('cv-chart');
  if(!ctx) return;
  const k = 5;
  const n = 20;
  cvChart = new Chart(ctx,{type:'bar',data:{labels:Array.from({length:n},(_,i)=>'S'+(i+1)),datasets:[
    {label:'Training',data:Array(n).fill(0),backgroundColor:'#3D3580'},
    {label:'Validation',data:Array(n).fill(0),backgroundColor:'#36D399'},
  ]},options:{responsive:true,plugins:{legend:{labels:{color:'#8B91B5',font:{size:12}}}},scales:{x:{stacked:true,ticks:{color:'#555A7A'},grid:{color:'rgba(255,255,255,.04)'}},y:{display:false,stacked:true}},animation:{duration:250}}});
  updateCV();
}

function updateCV(){
  const k = parseInt(document.getElementById('sl-k').value);
  document.getElementById('vb-k').textContent = k;
  const n = 20;
  const fold = Math.round(n/k);
  const valStart = 0;
  const trainData = Array(n).fill(1);
  const valData = Array(n).fill(0);
  for(let i=0;i<Math.min(fold,n);i++) {valData[i]=1;trainData[i]=0;}
  if(cvChart){
    cvChart.data.datasets[0].data = trainData;
    cvChart.data.datasets[1].data = valData;
    cvChart.update('none');
  }
  const bias = k===1?'Sehr hoch':k>=10?'Niedrig':'Mittel';
  const variance = k>=15?'Hoch':k<=3?'Niedrig':'Mittel';
  document.getElementById('cv-info').textContent = `k=${k}: ~${Math.round(n/k)} Samples pro Fold · Bias: ${bias} · Varianz: ${variance} · k=n = LOOCV`;
}

    <div class="viz-controls">
      <span class="viz-label">Steigung (β₁)</span>
      <div class="slider-row"><input type="range" min="-30" max="30" value="10" step="1" id="sl-b1" oninput="updateLogit()"><span class="val-badge" id="vb-b1">1.0</span></div>
    </div>
    <div class="viz-controls">
      <span class="viz-label">Intercept (β₀)</span>
      <div class="slider-row"><input type="range" min="-30" max="30" value="0" step="1" id="sl-b0" oninput="updateLogit()"><span class="val-badge" id="vb-b0">0.0</span></div>
    </div>
    <canvas id="logit-chart" height="220"></canvas>
    <div id="logit-info" style="margin-top:.75rem;font-size:13px;text-align:center;color:var(--text2)"></div>
  </div>`;
  setTimeout(()=>{initLogitChart();},50);
}

let logitChart = null;
function initLogitChart(){
  const ctx = document.getElementById('logit-chart');
  if(!ctx) return;
  if(logitChart){logitChart.destroy();logitChart=null;}
  const xs = Array.from({length:80},(_,i)=>-4+i*0.1);
  logitChart = new Chart(ctx,{type:'line',data:{labels:xs.map(x=>x.toFixed(1)),datasets:[{label:'P(Y=1|X)',data:xs.map(x=>1/(1+Math.exp(-(1*x+0)))),borderColor:'#7C6FED',backgroundColor:'rgba(124,111,237,.1)',tension:.4,fill:true,borderWidth:2,pointRadius:0}]},
  options:{responsive:true,plugins:{legend:{labels:{color:'#8B91B5',font:{size:12}}}},scales:{x:{title:{display:true,text:'X',color:'#555A7A'},ticks:{color:'#555A7A',maxTicksLimit:9},grid:{color:'rgba(255,255,255,.04)'}},y:{min:0,max:1,title:{display:true,text:'Wahrscheinlichkeit',color:'#555A7A'},ticks:{color:'#555A7A'},grid:{color:'rgba(255,255,255,.04)'}}},animation:{duration:200}}});
  updateLogit();
}

function updateLogit(){
  const b1 = parseInt(document.getElementById('sl-b1').value)/10;
  const b0 = parseInt(document.getElementById('sl-b0').value)/10;
  document.getElementById('vb-b1').textContent = b1.toFixed(1);
  document.getElementById('vb-b0').textContent = b0.toFixed(1);
  const xs = Array.from({length:80},(_,i)=>-4+i*0.1);
  const ys = xs.map(x=>1/(1+Math.exp(-(b1*x+b0))));
  if(logitChart){logitChart.data.datasets[0].data=ys;logitChart.update('none');}
  const dec = -b0/b1;
  document.getElementById('logit-info').textContent = `Entscheidungsgrenze bei X = ${isFinite(dec)?dec.toFixed(2):'∞'} · P = 0.5 · σ(z) = 1/(1+e⁻ᶻ)`;
}

/* ===================== EXAM ===================== */
let examState = {phase:'setup',qs:[],current:0,answers:[],timeLeft:0,timer:null,n:10,started:false};

function renderExam(){
  const main = document.getElementById('main');
  if(examState.phase==='setup') renderExamSetup(main);
  else if(examState.phase==='running') renderExamRunning(main);
  else renderExamResult(main);
}

function renderExamSetup(main){
  main.innerHTML = `
  <div class="section-hd"><div class="section-title">Prüfungssimulation</div><div class="section-sub">Simuliere deine Klausur — mit Zeitdruck und Auswertung</div></div>
  <div class="card" style="max-width:480px">
    <div style="margin-bottom:1.25rem">
      <div style="font-size:14px;font-weight:500;margin-bottom:8px;color:var(--text2)">Anzahl Fragen</div>
      <div style="display:flex;gap:8px">
        ${[5,10,15].map(n=>`<button class="btn${examState.n===n?' btn-primary':''} btn-sm" onclick="setExamN(${n})">${n} Fragen</button>`).join('')}
      </div>
    </div>
    <div style="margin-bottom:1.5rem">
      <div style="font-size:14px;font-weight:500;margin-bottom:8px;color:var(--text2)">Themen</div>
      <div style="font-size:13px;color:var(--text3)">Alle ${TOPICS.length} Kapitel werden gemischt</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;padding:1rem;background:var(--bg3);border-radius:var(--rs);margin-bottom:1.5rem">
      <i class="ti ti-clock" style="font-size:24px;color:var(--amber)" aria-hidden="true"></i>
      <div>
        <div style="font-size:14px;font-weight:500">${examState.n * 2} Minuten</div>
        <div style="font-size:12px;color:var(--text3)">2 Minuten pro Frage</div>
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="startExam()"><i class="ti ti-player-play" aria-hidden="true"></i> Prüfung starten</button>
  </div>
  ${ST.examScores.length ? `<div style="margin-top:1.5rem"><div style="font-size:15px;font-weight:600;margin-bottom:.75rem">Verlauf</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">${ST.examScores.slice(-8).map(s=>`<span class="pill ${s.pct>=80?'pill-green':s.pct>=60?'pill-amber':'pill-red'}">${s.pct}%</span>`).join('')}</div></div>` : ''}`;
}

function setExamN(n){ examState.n=n; renderExam(); }

async function startExam(){
  const main = document.getElementById('main');
  main.innerHTML = `<div class="loading"><div class="spin"></div> Prüfung wird vorbereitet (${examState.n} Fragen)…</div>`;
  const shuffled = [...TOPICS].sort(()=>Math.random()-.5).slice(0,examState.n);
  const qps = shuffled.map(t=>`Erstelle 1 Multiple-Choice-Frage für "${t.label}". Schlüsselkonzepte: ${t.keys}. JSON: {"question":"...","options":["A)...","B)...","C)...","D)..."],"correct":0,"topic":"${t.label}"}`);
  try{
    const qs = await Promise.all(qps.map(async p=>{
      const r = await apicall(p, 600);
      return JSON.parse(r.replace(/```json|```/g,'').trim());
    }));
    examState = {...examState, phase:'running', qs, current:0, answers:[], timeLeft:examState.n*120};
    renderExam(); startTimer();
  }catch(e){main.innerHTML=`<div class="empty"><p style="color:var(--red)">Fehler beim Laden. Erneut versuchen.</p></div><div class="btn-row"><button class="btn btn-primary" onclick="goPage('exam')">Zurück</button></div>`}
}

function startTimer(){
  if(examState.timer) clearInterval(examState.timer);
  examState.timer = setInterval(()=>{
    examState.timeLeft--;
    const el = document.getElementById('exam-timer');
    if(el){
      const m=Math.floor(examState.timeLeft/60), s=examState.timeLeft%60;
      el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
      el.className = 'timer'+(examState.timeLeft<30?' danger':examState.timeLeft<60?' warning':'');
    }
    if(examState.timeLeft<=0){ clearInterval(examState.timer); finishExam(); }
  },1000);
}

function renderExamRunning(main){
  const q = examState.qs[examState.current];
  const total = examState.qs.length;
  const m=Math.floor(examState.timeLeft/60), s=examState.timeLeft%60;
  const tclass = examState.timeLeft<30?'danger':examState.timeLeft<60?'warning':'';
  main.innerHTML = `
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem">
    <div class="progress-ring-wrap" style="flex:1;margin:0">
      <span class="q-counter">${examState.current+1}/${total}</span>
      <div class="prog-bar"><div class="prog-fill" style="width:${examState.current/total*100}%"></div></div>
    </div>
    <div class="timer ${tclass}" id="exam-timer">${m}:${s.toString().padStart(2,'0')}</div>
  </div>
  <div class="card">
    <div class="q-meta"><span class="pill pill-purple">${q.topic||'Statistical Learning'}</span></div>
    <div class="q-text">${q.question}</div>
    <div class="opts">
      ${q.options.map((o,i)=>`<button class="opt" id="eo${i}" onclick="examAnswer(${i})">${o}</button>`).join('')}
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-sm" onclick="examSkip()"><i class="ti ti-arrow-right" aria-hidden="true"></i> Überspringen</button>
    <button class="btn btn-sm" style="margin-left:auto;color:var(--red)" onclick="if(confirm('Prüfung beenden?'))finishExam()">Beenden</button>
  </div>`;
}

function examAnswer(idx){
  examState.answers.push({q:examState.current, chosen:idx, correct:examState.qs[examState.current].correct});
  examNext();
}

function examSkip(){
  examState.answers.push({q:examState.current, chosen:-1, correct:examState.qs[examState.current].correct});
  examNext();
}

function examNext(){
  examState.current++;
  if(examState.current >= examState.qs.length) finishExam();
  else { renderExam(); }
}

function finishExam(){
  if(examState.timer) clearInterval(examState.timer);
  examState.phase = 'result';
  const correct = examState.answers.filter(a=>a.chosen===a.correct).length;
  const total = examState.qs.length;
  const pct = Math.round(correct/total*100);
  const timeUsed = examState.n*120 - examState.timeLeft;
  ST.examScores.push({correct,total,pct,time:timeUsed});
  addXP(pct);
  save(); renderExam();
}

function renderExamResult(main){
  const last = ST.examScores[ST.examScores.length-1];
  const pct = last.pct;
  const color = pct>=80?'var(--green)':pct>=60?'var(--amber)':'var(--red)';
  const msg = pct>=80?'Sehr gut! Bestanden! 🎉':pct>=60?'Gut! Noch etwas üben 💪':'Weiter üben! Du schaffst das 📚';
  main.innerHTML = `
  <div class="result-center">
    <div class="result-ring" style="border-color:${color};color:${color}">${pct}<span style="font-size:16px">%</span></div>
    <div style="font-size:22px;font-weight:700;margin-bottom:8px">${msg}</div>
    <div style="font-size:15px;color:var(--text2);margin-bottom:1.5rem">${last.correct} von ${last.total} Fragen richtig · ${Math.round(last.time)}s</div>
    <div class="score-summary">
      <div class="stat-card"><div class="stat-val" style="color:${color}">${pct}%</div><div class="stat-lbl">Score</div></div>
      <div class="stat-card"><div class="stat-val text-green">${last.correct}</div><div class="stat-lbl">Richtig</div></div>
      <div class="stat-card"><div class="stat-val text-red">${last.total-last.correct}</div><div class="stat-lbl">Falsch</div></div>
    </div>
    <div class="btn-row" style="justify-content:center;margin-top:1.5rem">
      <button class="btn btn-primary" onclick="examState.phase='setup';renderExam()"><i class="ti ti-refresh" aria-hidden="true"></i> Neu starten</button>
      <button class="btn" onclick="goPage('learn')"><i class="ti ti-book" aria-hidden="true"></i> Weiter lernen</button>
    </div>
  </div>`;
}

/* ===================== CHAT ===================== */
function renderChat(){
  const main = document.getElementById('main');
  main.innerHTML = `
  <div class="section-hd"><div class="section-title">KI-Tutor</div><div class="section-sub">Dein persönlicher Statistik-Tutor — frage alles zu ISLP</div></div>
  <div class="card">
    <div class="chat-wrap" id="chat-msgs">
      ${ST.chatHistory.length ? ST.chatHistory.slice(-20).map(m=>`<div class="msg ${m.role==='user'?'user':'ai'}">${m.content}</div>`).join('') : '<div class="msg ai">👋 Hallo! Ich bin dein KI-Tutor für Statistical Learning. Frag mich alles zu deinen Prüfungsthemen!</div>'}
    </div>
    <div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border)">
      <button class="chip" onclick="sendChat('Was ist der Bias-Varianz-Tradeoff?')">Bias-Varianz</button>
      <button class="chip" onclick="sendChat('Erkläre Lasso vs Ridge Regression')">Lasso vs Ridge</button>
      <button class="chip" onclick="sendChat('Wann nutze ich Kreuzvalidierung?')">Kreuzvalidierung</button>
      <button class="chip" onclick="sendChat('Was ist der Unterschied zwischen Klassifikation und Regression?')">Klassif. vs Regr.</button>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-in" placeholder="Frage eingeben…" onkeydown="if(event.key==='Enter')sendChatInput()">
      <button class="btn btn-primary btn-sm" onclick="sendChatInput()"><i class="ti ti-send" aria-hidden="true"></i></button>
    </div>
  </div>`;
  scrollChat();
}

function sendChatInput(){
  const inp = document.getElementById('chat-in');
  if(!inp||!inp.value.trim()) return;
  sendChat(inp.value.trim()); inp.value='';
}

async function sendChat(msg){
  ST.chatHistory.push({role:'user',content:msg});
  renderChat();
  scrollChat();
  const msgs = document.getElementById('chat-msgs');
  const load = document.createElement('div');
  load.className='msg ai';
  load.innerHTML='<div class="loading"><div class="spin"></div> Denkt nach…</div>';
  if(msgs) msgs.appendChild(load);
  scrollChat();

  const history = ST.chatHistory.slice(-10).map(m=>({role:m.role,content:m.content}));
  const sys = `Du bist ein freundlicher Statistikprofessor und erklärst Konzepte aus ISLP (Introduction to Statistical Learning with Python). Antworte präzise auf Deutsch, max. 200 Wörter. Nutze ggf. kurze Formeln als Text. Prüfungsrelevant.`;
  try{
    const r = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:800,system:sys,messages:history})});
    const d = await r.json();
    const reply = d.content.map(c=>c.text||'').join('').replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    ST.chatHistory.push({role:'assistant',content:reply});
    save(); renderChat();
  }catch(e){
    ST.chatHistory.push({role:'assistant',content:'Entschuldigung, Fehler beim Laden. Bitte erneut versuchen.'});
    save(); renderChat();
  }
}

function scrollChat(){
  const c = document.getElementById('chat-msgs');
  if(c) setTimeout(()=>c.scrollTop=c.scrollHeight,50);
}

/* ===================== API ===================== */
async function apicall(prompt, tokens=800){
  const r = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:tokens,messages:[{role:'user',content:prompt}]})});
  const d = await r.json();
  return d.content.map(c=>c.text||'').join('');
}

/* ===================== INIT ===================== */
updateStreakBadge();
renderSidebar();
render();
</script>
