<style>
:root {
  --bg-base: #0f111a; --bg-glass: rgba(26, 29, 45, 0.65); --bg-glass-hover: rgba(38, 43, 66, 0.8);
  --panel-border: rgba(255, 255, 255, 0.08); --accent-glow: rgba(99, 102, 241, 0.15);
  --text-main: #f1f5f9; --text-muted: #94a3b8; --text-dark: #64748b;
  --primary: #6366f1; --primary-hover: #4f46e5; --primary-light: #818cf8;
  --success: #10b981; --success-bg: rgba(16, 185, 129, 0.1);
  --warning: #f59e0b; --warning-bg: rgba(245, 158, 11, 0.1);
  --danger: #ef4444; --danger-bg: rgba(239, 68, 68, 0.1);
  --info: #0ea5e9; --radius-lg: 16px; --radius-md: 12px; --radius-sm: 8px;
  --font-sans: 'Plus Jakarta Sans', sans-serif; --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background-color: var(--bg-base); color: var(--text-main); line-height: 1.6; min-height: 100vh; overflow-x: hidden; background-image: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.08), transparent 25%), radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.05), transparent 25%); background-attachment: fixed; }
button { font-family: inherit; cursor: pointer; border: none; outline: none; background: transparent; }

/* === TYPOGRAPHY === */
h1, h2, h3, h4 { font-weight: 700; color: #fff; letter-spacing: -0.02em; }
p { margin-bottom: 1rem; color: var(--text-muted); }
strong { color: var(--text-main); font-weight: 600; }
.math { font-family: var(--font-mono); background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; color: var(--primary-light); }

/* === LAYOUT & NAVIGATION === */
.navbar { position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); background: rgba(15, 17, 26, 0.8); border-bottom: 1px solid var(--panel-border); padding: 0.75rem 2rem; display: flex; align-items: center; justify-content: space-between; }
.brand { display: flex; align-items: center; gap: 0.75rem; font-size: 1.25rem; font-weight: 800; letter-spacing: -0.03em; }
.brand i { color: var(--primary); font-size: 1.5rem; }
.nav-links { display: flex; gap: 0.5rem; background: rgba(255,255,255,0.03); padding: 0.25rem; border-radius: 100px; border: 1px solid var(--panel-border); }
.nav-btn { padding: 0.5rem 1.25rem; border-radius: 100px; color: var(--text-muted); font-weight: 600; font-size: 0.9rem; transition: all 0.2s ease; display: flex; align-items: center; gap: 0.5rem; }
.nav-btn:hover { color: var(--text-main); }
.nav-btn.active { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

.app-container { display: flex; min-height: calc(100vh - 65px); }
.sidebar { width: 280px; background: var(--bg-glass); border-right: 1px solid var(--panel-border); padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; overflow-y: auto; flex-shrink: 0; }
.main-content { flex: 1; padding: 2rem 3rem; overflow-y: auto; max-width: 1200px; margin: 0 auto; }

/* === SIDEBAR ITEMS === */
.topic-btn { padding: 0.875rem 1rem; border-radius: var(--radius-sm); color: var(--text-muted); text-align: left; font-size: 0.875rem; font-weight: 500; display: flex; align-items: center; gap: 0.75rem; transition: all 0.2s; border: 1px solid transparent; }
.topic-btn:hover { background: rgba(255,255,255,0.03); border-color: var(--panel-border); color: var(--text-main); }
.topic-btn.active { background: var(--accent-glow); border-color: rgba(99, 102, 241, 0.3); color: var(--primary-light); }
.topic-icon { font-size: 1.25rem; }
.topic-status { margin-left: auto; width: 8px; height: 8px; border-radius: 50%; background: var(--panel-border); }
.topic-status.mastered { background: var(--success); box-shadow: 0 0 8px var(--success); }
.topic-status.started { background: var(--warning); }

/* === UI COMPONENTS === */
.glass-panel { background: var(--bg-glass); backdrop-filter: blur(10px); border: 1px solid var(--panel-border); border-radius: var(--radius-lg); padding: 1.5rem; }
.btn { padding: 0.75rem 1.5rem; border-radius: var(--radius-sm); font-weight: 600; font-size: 0.9rem; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; border: 1px solid var(--panel-border); background: var(--bg-glass); color: var(--text-main); }
.btn:hover { background: var(--bg-glass-hover); border-color: var(--text-dark); transform: translateY(-1px); }
.btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
.btn-success { background: var(--success); border-color: var(--success); color: #fff; }
.badge { padding: 0.25rem 0.75rem; border-radius: 100px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.badge-purple { background: rgba(99, 102, 241, 0.15); color: var(--primary-light); border: 1px solid rgba(99,102,241,0.3); }

/* === DASHBOARD === */
.hero { display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem; padding: 2rem; background: linear-gradient(145deg, rgba(99,102,241,0.1), transparent); border: 1px solid rgba(99,102,241,0.2); border-radius: var(--radius-lg); }
.hero-icon { width: 80px; height: 80px; border-radius: 20px; background: linear-gradient(135deg, var(--primary), var(--info)); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #fff; box-shadow: 0 10px 25px rgba(99,102,241,0.3); }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.stat-card { text-align: center; padding: 1.5rem; }
.stat-value { font-size: 2.5rem; font-weight: 800; font-family: var(--font-mono); margin-bottom: 0.25rem; background: linear-gradient(to right, #fff, var(--text-muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* === LEARNING AREA === */
.mode-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--panel-border); padding-bottom: 1rem; overflow-x: auto; }
.mode-tab { padding: 0.5rem 1rem; border-radius: var(--radius-sm); color: var(--text-muted); font-weight: 600; font-size: 0.9rem; }
.mode-tab.active { background: rgba(255,255,255,0.05); color: var(--text-main); }
.theory-content { font-size: 1.05rem; line-height: 1.8; color: #cbd5e1; }
.theory-content h3 { margin: 1.5rem 0 1rem; color: var(--primary-light); font-size: 1.25rem; }
.theory-content ul { padding-left: 1.5rem; margin-bottom: 1.5rem; }
.theory-content li { margin-bottom: 0.5rem; }

/* === QUIZ === */
.quiz-card { padding: 2rem; position: relative; }
.q-diff { position: absolute; top: 1.5rem; right: 1.5rem; }
.q-text { font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem; line-height: 1.5; color: #fff; }
.opts-grid { display: flex; flex-direction: column; gap: 0.75rem; }
.opt-btn { padding: 1rem 1.25rem; text-align: left; border: 1px solid var(--panel-border); background: rgba(255,255,255,0.02); border-radius: var(--radius-sm); color: var(--text-main); font-size: 1rem; transition: all 0.2s; }
.opt-btn:hover:not(:disabled) { background: rgba(255,255,255,0.06); border-color: var(--text-dark); }
.opt-btn.correct { background: var(--success-bg); border-color: var(--success); color: var(--success); }
.opt-btn.wrong { background: var(--danger-bg); border-color: var(--danger); color: var(--danger); }
.opt-btn.show-correct { border-color: var(--success); box-shadow: 0 0 0 1px var(--success); }
.explanation { margin-top: 1.5rem; padding: 1.25rem; border-left: 4px solid var(--primary); background: var(--accent-glow); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; display: none; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* === FLASHCARDS === */
.fc-container { perspective: 1000px; width: 100%; max-width: 600px; margin: 0 auto 2rem; height: 300px; }
.fc-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
.fc-inner.flipped { transform: rotateY(180deg); }
.fc-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2.5rem; border-radius: var(--radius-lg); border: 1px solid var(--panel-border); background: var(--bg-glass); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
.fc-back { transform: rotateY(180deg); background: linear-gradient(135deg, rgba(26,29,45,0.9), rgba(38,43,66,0.9)); border-color: var(--primary-light); }
.fc-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dark); margin-bottom: 1rem; }
.fc-content { font-size: 1.25rem; font-weight: 500; color: #fff; line-height: 1.5; }
.fc-back .fc-content { font-size: 1.1rem; color: #e2e8f0; font-weight: 400; }

/* === SANDBOX / VIZ === */
.sandbox-controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; padding: 1.5rem; background: rgba(0,0,0,0.2); border-radius: var(--radius-sm); }
.control-group { display: flex; flex-direction: column; gap: 0.5rem; }
.control-header { display: flex; justify-content: space-between; font-size: 0.875rem; color: var(--text-muted); }
input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--primary); cursor: pointer; margin-top: -6px; box-shadow: 0 0 10px rgba(99,102,241,0.5); }
input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: var(--text-dark); border-radius: 2px; }
canvas { max-width: 100%; background: rgba(0,0,0,0.15); border-radius: var(--radius-sm); border: 1px solid var(--panel-border); padding: 1rem; }
.metrics-row { display: flex; justify-content: space-around; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--panel-border); }
.metric { text-align: center; }
.metric-val { font-family: var(--font-mono); font-size: 1.5rem; font-weight: 700; color: var(--primary-light); }

/* === EXAM === */
.exam-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
.exam-summary { text-align: center; padding: 3rem; }
.circle-score { width: 150px; height: 150px; border-radius: 50%; border: 8px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 800; margin: 0 auto 1.5rem; text-shadow: 0 0 20px rgba(99,102,241,0.5); box-shadow: 0 0 30px rgba(99,102,241,0.2); }

/* UTILS */
.hidden { display: none !important; }
.text-green { color: var(--success); }
.text-red { color: var(--danger); }
.text-amber { color: var(--warning); }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb { background: var(--text-dark); border-radius: 4px; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
/**
 * ISLP KNOWLEDGE BASE (Strictly based on requested chapters)
 */
const ISLP_DATA = {
  topics: [
    { id: 't1', icon: '🚀', title: 'Einführung & Modeling', desc: 'Prediction, Inference, Parametrisch vs. Non-parametrisch.' },
    { id: 't2', icon: '⚖️', title: 'Bias-Varianz-Tradeoff', desc: 'Modellgüte, Trainings- vs. Testfehler, MSE.' },
    { id: 't3', icon: '🧮', title: 'Klassifikation', desc: 'Naive Bayes, KNN, Logistische Regression.' },
    { id: 't4', icon: '📈', title: 'Einfache Lin. Reg.', desc: 'Kleinste Quadrate, RSE, R²-Statistik.' },
    { id: 't5', icon: '📉', title: 'Multiple Lin. Reg.', desc: 'F-Statistik, Multikollinearität, p-Werte.' },
    { id: 't6', icon: '🏷️', title: 'Qualitative Prädiktoren', desc: 'Dummy-Variablen, Polynomterme.' },
    { id: 't7', icon: '🔗', title: 'Interaktionen & Probleme', desc: 'Synergie, Ausreißer, Leverage, Heteroskedastizität.' },
    { id: 't8', icon: '🔄', title: 'Resampling: CV', desc: 'Validation Set, LOOCV, k-Fold.' },
    { id: 't9', icon: '🔃', title: 'Resampling: Bootstrap', desc: 'Schätzung von Standardfehlern mit Replacement.' },
    { id: 't10', icon: '🧊', title: 'Hochdimensional (p >> n)', desc: 'Fluch der Dimensionalität, Overfitting-Gefahr.' },
    { id: 't11', icon: '✂️', title: 'Lasso-Regression', desc: 'L1-Regularisierung, Feature Selection, Shrinkage.' }
  ],
  theory: {
    't1': `<h3>Statistical Learning</h3><p>Statistical Learning bezeichnet Werkzeuge zum Verständnis von Daten. <strong>Prediction (Vorhersage):</strong> Fokus auf die Genauigkeit der Vorhersage <span class="math">Ŷ = f̂(X)</span> (Modell als Blackbox). <strong>Inference (Inferenz):</strong> Fokus auf das Verständnis der Beziehung zwischen <span class="math">X</span> und <span class="math">Y</span> (Welche Prädiktoren sind wichtig? Ist der Effekt positiv/negativ?).</p><h3>Parametrisch vs. Non-Parametrisch</h3><ul><li><strong>Parametrisch:</strong> 1. Annahme über die Form von f (z.B. linear). 2. Schätzung der Parameter (z.B. OLS). Vorteil: Leicht interpretierbar. Nachteil: Gefahr starker Verzerrung (Bias), wenn Annahme falsch ist.</li><li><strong>Non-parametrisch:</strong> Keine explizite Annahme über die Form von f. Vorteil: Flexibel. Nachteil: Benötigt sehr viele Beobachtungen für genaue Schätzungen ohne Overfitting.</li></ul>`,
    't2': `<h3>Der Bias-Varianz-Tradeoff</h3><p>Der erwartete Test-MSE für einen neuen Wert <span class="math">x_0</span> lässt sich zerlegen in: <span class="math">Test-MSE = Var(f̂(x_0)) + [Bias(f̂(x_0))]² + Var(&epsilon;)</span>.</p><ul><li><strong>Varianz:</strong> Wie stark ändert sich <span class="math">f̂</span>, wenn ein anderer Trainingsdatensatz verwendet wird? Hohe Flexibilität = hohe Varianz.</li><li><strong>Bias (Verzerrung):</strong> Der Fehler durch Annäherung eines komplexen realen Problems durch ein simples Modell (z.B. linear). Hohe Flexibilität = geringer Bias.</li><li><strong>Irreducible Error:</strong> <span class="math">Var(&epsilon;)</span>. Die Varianz des Fehlerterms. Die untere Grenze, die kein Modell unterschreiten kann.</li></ul><p><strong>Overfitting:</strong> Ein hochflexibles Modell lernt das Rauschen der Trainingsdaten. Der Trainingsfehler sinkt gegen Null, aber der Testfehler steigt U-förmig wieder an.</p>`,
    't3': `<h3>Klassifikationsmodelle</h3><p><strong>Logistische Regression:</strong> Modelliert Wahrscheinlichkeiten mittels der Sigmoid-Funktion: <span class="math">p(X) = e^(β0+β1X) / (1+e^(β0+β1X))</span>. Die Log-Odds (Logit) sind linear: <span class="math">log(p(X)/(1-p(X))) = β0 + β1X</span>.</p><p><strong>K-Nearest Neighbors (KNN):</strong> Non-parametrisch. Bestimmt die K nächsten Trainingspunkte zu einem Testpunkt und weist die Mehrheitsklasse zu. <span class="math">K=1</span> bedeutet extrem hohe Varianz, geringen Bias (gezackte Decision Boundary). Großes K bedeutet geringere Varianz, hohen Bias (glatte Boundary).</p><p><strong>Naive Bayes:</strong> Geht davon aus, dass alle Prädiktoren bedingt durch die Klasse unabhängig sind. Trotz dieser "naiven" Annahme oft sehr leistungsstark, da es die Schätzung von komplexen gemeinsamen Verteilungen erspart (Reduktion der Varianz auf Kosten von Bias).</p>`,
    't4': `<h3>Einfache Lineare Regression</h3><p>Modelliert eine lineare Beziehung: <span class="math">Y ≈ β0 + β1X</span>. OLS (Ordinary Least Squares) schätzt die Parameter so, dass die Residuenquadratsumme (RSS) minimiert wird.</p><ul><li><strong>RSE (Residual Standard Error):</strong> Schätzer für die Standardabweichung des Fehlerterms <span class="math">&epsilon;</span>. Absolute Maßzahl für den Lack-of-Fit.</li><li><strong>R²-Statistik:</strong> Anteil der durch das Modell erklärten Varianz an der Gesamtvarianz: <span class="math">R² = (TSS - RSS)/TSS</span>. Wert zwischen 0 und 1.</li><li><strong>Hypothesentest:</strong> Prüft <span class="math">H_0: β_1 = 0</span> mittels t-Statistik. Ein p-Wert < 0.05 führt typischerweise zur Ablehnung der Nullhypothese.</li></ul>`,
    't5': `<h3>Multiple Lineare Regression</h3><p>Erweiterung auf p Prädiktoren: <span class="math">Y = β0 + β1X1 + ... + βpXp + &epsilon;</span>. <span class="math">βj</span> ist der durchschnittliche Effekt einer Erhöhung von <span class="math">Xj</span> um eine Einheit, <strong>während alle anderen Prädiktoren konstant gehalten werden</strong>.</p><ul><li><strong>Globale Nullhypothese:</strong> <span class="math">H_0: β_1 = β_2 = ... = β_p = 0</span>. Wird durch die <strong>F-Statistik</strong> getestet. Wichtig bei großem p, um False Discoveries bei einzelnen t-Tests zu vermeiden.</li><li><strong>Multikollinearität:</strong> Zwei oder mehr Prädiktoren sind stark korreliert. Führt zu aufgeblähten Standardfehlern der Koeffizienten (messbar durch den VIF - Variance Inflation Factor). VIF > 5 oder 10 ist kritisch.</li></ul>`,
    't6': `<h3>Qualitative Prädiktoren & Polynome</h3><p><strong>Dummy-Variablen:</strong> Bei k Kategorien benötigt man exakt <span class="math">k - 1</span> Dummy-Variablen. Die verbleibende Kategorie ist die Baseline (fließt in den Intercept <span class="math">β_0</span> ein). Codiert man versehentlich k Dummies + Intercept, entsteht perfekte Kollinearität (Matrix ist nicht invertierbar).</p><p><strong>Polynomregression:</strong> Erweitert das lineare Modell durch Potenzen: <span class="math">Y = β_0 + β_1X + β_2X² + ...</span>. Obwohl X² nicht linear in X ist, bleibt es ein lineares Modell bezüglich der Parameter <span class="math">β</span> und kann per OLS geschätzt werden. Zu hohe Grade führen jedoch starkem Overfitting an den Rändern.</p>`,
    't7': `<h3>Interaktionen & Diagnose</h3><p><strong>Interaktionsterme (Synergie):</strong> Modelliert, wenn der Effekt von <span class="math">X_1</span> auf <span class="math">Y</span> vom Wert von <span class="math">X_2</span> abhängt: <span class="math">Y = β_0 + β_1X_1 + β_2X_2 + β_3(X_1 × X_2)</span>. <em>Hierarchisches Prinzip:</em> Wenn ein Interaktionsterm im Modell ist, müssen die Haupteffekte bleiben, selbst wenn ihre p-Werte nicht signifikant sind.</p><p><strong>Potentielle Probleme:</strong></p><ul><li><em>Heteroskedastizität:</em> Nicht-konstante Fehlervarianz (Trichterform im Residualplot). Lösung: log(Y) oder √Y Transformation.</li><li><em>Ausreißer:</em> Extremer Y-Wert. Hat wenig Einfluss auf die Gerade bei niedrigem Leverage, verschlechtert aber den RSE drastisch.</li><li><em>High Leverage Points:</em> Ein ungewöhnlicher X-Wert. Zieht die Regressionsgerade stark an sich. (Gefährlichste Kombi: High Leverage + Ausreißer).</li></ul>`,
    't8': `<h3>Kreuzvalidierung (CV)</h3><p>Methoden zur Schätzung des Testfehlers auf Basis der Trainingsdaten.</p><ul><li><strong>Validation Set:</strong> Zufälliger 50/50 Split. Hoch variabel, überschätzt oft den Testfehler, da das Modell nur mit der halben Datenmenge trainiert wird.</li><li><strong>LOOCV (Leave-One-Out):</strong> <span class="math">n-1</span> Training, 1 Test. Wird n-mal wiederholt. Fast bias-frei, aber hohe Varianz (Modelle sind fast identisch) und rechenintensiv. (Shortcut existiert für OLS).</li><li><strong>k-Fold CV:</strong> Daten in k (oft 5 oder 10) Folds aufgeteilt. Sweet-Spot im Bias-Varianz-Tradeoff. Weniger Varianz in der Schätzung als LOOCV, weniger Bias als Validation Set.</li></ul>`,
    't9': `<h3>Bootstrap</h3><p>Eine universelle Methode zur Schätzung der Unsicherheit (z.B. Standardfehler, Konfidenzintervalle) für fast jede Statistik.</p><ul><li>Zieht <span class="math">B</span> mal wiederholt Stichproben der Größe <span class="math">n</span> <strong>mit Zurücklegen (with replacement)</strong> aus den Originaldaten.</li><li>Bei ausreichend großem <span class="math">n</span> enthält ein Bootstrap-Sample durchschnittlich ca. 63.2% der ursprünglichen, distinkten Beobachtungen (da <span class="math">1 - (1 - 1/n)^n ≈ 1 - 1/e ≈ 0.632</span>).</li><li>Erlaubt empirische Schätzungen der Varianz, wenn keine analytischen Formeln vorliegen oder OLS-Annahmen (wie konstante Fehlervarianz) verletzt sind.</li></ul>`,
    't10': `<h3>High-Dimensional Data (p >> n)</h3><p>Tritt auf, wenn es mehr Features <span class="math">p</span> als Beobachtungen <span class="math">n</span> gibt (z.B. Genetik, Suchbegriffe).</p><ul><li>Klassisches OLS schlägt fehl: Es gibt keine eindeutige Lösung, das Modell fittet die Trainingsdaten exakt (Residuen = 0, R² = 1), liefert aber extrem schlechte Testfehler (katastrophales Overfitting).</li><li>Der "Fluch der Dimensionalität": Hinzufügen von reinen Noise-Features erhöht zwar fälschlicherweise das Trainings-R², zerstört aber die Varianz des Modells auf Testdaten.</li><li>Lösung: Methoden, die Varianz extrem reduzieren, wie Lasso, Ridge oder PCA-Regression. Klassische Gütemaße (C_p, AIC, adjustiertes R²) sind hier nicht anwendbar!</li></ul>`,
    't11': `<h3>Shrinkage: Die Lasso-Regression</h3><p>Lasso minimiert die OLS-Gleichung, fügt aber einen Strafterm (Penalty) hinzu: <span class="math">λ ∑|β_j|</span> (L1-Norm). <span class="math">λ</span> steuert die Stärke der Strafe.</p><ul><li><strong>Vorteil ggü. Ridge:</strong> Der L1-Strafterm bildet einen rautenförmigen Nebenbedingungsraum (Ecken auf den Achsen). Das führt dazu, dass unwichtige Koeffizienten <strong>exakt auf Null</strong> gesetzt werden (Feature Selection / Sparsity).</li><li>Führt zu deutlich interpretierbareren Modellen als Ridge.</li><li>Je größer <span class="math">λ</span>, desto geringer die Varianz des Modells, aber desto höher der Bias. Das optimale <span class="math">λ</span> wird über Kreuzvalidierung bestimmt.</li><li>Erfordert zwingend eine vorherige Standardisierung der Prädiktoren!</li></ul>`
  },
  questions: [
    { t: 't1', d: 1, q: "Was ist der primäre Fokus bei einem 'Inference'-Problem laut ISLP?", o: ["Die absolute Vorhersagegenauigkeit von Ŷ zu maximieren.", "Das Modell als reine Blackbox zu behandeln.", "Die Beziehung zwischen den Prädiktoren X und der Zielvariable Y zu verstehen.", "Unüberwachtes Lernen durchzuführen."], c: 2, e: "Bei Inferenz geht es darum, die kausalen oder strukturellen Zusammenhänge zu verstehen (welche X beeinflussen Y wie?), nicht nur um die Vorhersage (Prediction)." },
    { t: 't1', d: 2, q: "Welche Aussage trifft auf parametrische Methoden zu?", o: ["Sie erfordern keine Annahmen über die Form der Funktion f.", "Sie schätzen eine kleine Anzahl von Parametern, bergen aber das Risiko eines hohen Bias bei falscher Form-Annahme.", "Sie sind immer genauer als non-parametrische Methoden.", "Sie können nicht überfitten."], c: 1, e: "Parametrische Methoden reduzieren das Schätzproblem auf wenige Parameter, was recheneffizient ist, aber bei falscher Annahme einen systematischen Fehler (Bias) erzeugt." },
    
    { t: 't2', d: 1, q: "Was beschreibt der 'Irreducible Error'?", o: ["Den Fehler, der durch ein schlecht gewähltes Modell entsteht.", "Die Varianz des Fehlerterms ε, die von keinem Modell vorhergesagt werden kann.", "Die Differenz zwischen Training- und Test-MSE.", "Den Bias eines linearen Modells."], c: 1, e: "Selbst wenn wir die wahre Funktion f(X) exakt schätzen, bleibt die zufällige Streuung des Fehlerterms ε als untere Schranke der Vorhersagegenauigkeit." },
    { t: 't2', d: 3, q: "Wie verhalten sich Training- und Test-MSE bei stark zunehmender Modellkomplexität?", o: ["Beide sinken monoton gegen Null.", "Beide steigen stetig an.", "Der Trainings-MSE sinkt gegen Null, der Test-MSE sinkt zunächst und steigt dann stark an (U-Form).", "Der Trainings-MSE steigt, der Test-MSE sinkt."], c: 2, e: "Das klassische Overfitting: Das Modell passt sich perfekt an das Rauschen der Trainingsdaten an (Trainings-MSE fällt), verliert aber die Generalisierbarkeit auf neue Daten (Test-MSE steigt stark)." },
    
    { t: 't3', d: 2, q: "Welche grundlegende (oft unrealistische) Annahme trifft der 'Naive' Bayes Klassifikator?", o: ["Die Klassen sind perfekt linear trennbar.", "Die Prädiktoren sind innerhalb einer Klasse stochastisch unabhängig voneinander.", "Die Fehlerterme sind normalverteilt.", "Die Zielvariable ist stetig."], c: 1, e: "Das 'Naiv' rührt von der starken Annahme, dass die Kovarianz zwischen Features bedingt auf die Klasse null ist, was die Schätzung massiv vereinfacht." },
    { t: 't3', d: 2, q: "Was modelliert die Logistische Regression mathematisch gesehen als lineare Funktion?", o: ["Die Wahrscheinlichkeit p(X) direkt.", "Die Klasse Y ∈ {0, 1}.", "Die Log-Odds (den Logit): log(p(X)/(1-p(X))).", "Den Gini-Index."], c: 2, e: "Während die vorhergesagten Wahrscheinlichkeiten durch die s-förmige Sigmoid-Funktion laufen, sind die Log-Odds (das Verhältnis von P(Erfolg) zu P(Misserfolg) logarithmiert) eine strikt lineare Funktion der Parameter." },
    
    { t: 't4', d: 1, q: "Was minimiert das OLS-Verfahren (Ordinary Least Squares)?", o: ["Das Bestimmtheitsmaß R².", "Die Varianz der Prädiktoren.", "Die Summe der quadrierten Residuen (RSS).", "Die absoluten Abstände der Fehler."], c: 2, e: "OLS sucht die Regressionskoeffizienten so, dass die Summe der quadrierten vertikalen Abstände der Datenpunkte zur Gerade (RSS) so klein wie möglich wird." },
    { t: 't4', d: 2, q: "Was drückt die R²-Statistik in der einfachen linearen Regression aus?", o: ["Die Standardabweichung des Fehlerterms.", "Den Anteil der Gesamtvarianz in Y, der durch das Modell (bzw. X) erklärt wird.", "Den p-Wert des Steigungskoeffizienten.", "Den Korrelationskoeffizienten zum Quadrat (bei multipler Regression falsch)."], c: 1, e: "R² = (TSS - RSS) / TSS. Es ist eine dimensionslose Kennzahl zwischen 0 und 1." },

    { t: 't5', d: 3, q: "Warum nutzen wir die F-Statistik, um die globale Signifikanz eines multiplen Modells zu testen, anstatt nur die p-Werte der t-Tests zu betrachten?", o: ["Weil t-Tests bei multipler Regression mathematisch ungültig sind.", "Weil bei großem p durch multiplen Fehler 1. Art fälschlicherweise fast immer einzelne Prädiktoren signifikant erscheinen würden.", "Weil die F-Statistik den R²-Wert direkt optimiert.", "Weil die t-Statistik keine Interaktionsterme berücksichtigen kann."], c: 1, e: "Bei z.B. 100 nutzlosen Variablen haben im Schnitt 5 Variablen rein zufällig einen p-Wert < 0.05. Der globale F-Test schützt vor diesem multiplen Testproblem." },
    { t: 't5', d: 2, q: "Was zeigt ein hoher VIF (Variance Inflation Factor, z.B. > 10) an?", o: ["Heteroskedastizität der Fehlerterme.", "Starke Multikollinearität (hohe Korrelation zwischen Prädiktoren).", "Einen High Leverage Point im Datensatz.", "Ein Modell, das zu wenig Variablen enthält."], c: 1, e: "Multikollinearität bläht die Varianz (und den Standardfehler) der Koeffizienten auf, was es schwer macht, den echten Effekt einzelner Variablen zu isolieren." },

    { t: 't6', d: 1, q: "Wie viele Dummy-Variablen werden für ein qualitatives Feature mit 5 Ausprägungen (z.B. Wochentage Mo-Fr) in einer linearen Regression benötigt?", o: ["5", "1", "4", "25"], c: 2, e: "Man braucht immer k-1 Dummies. Die fehlende Kategorie wird zur 'Baseline', deren Effekt vom Intercept (Achsenabschnitt) aufgefangen wird. Verwendet man k Dummies plus Intercept, entsteht die 'Dummy Variable Trap' (Singularität)." },
    { t: 't6', d: 2, q: "Warum rät ISLP oft davon ab, bei Polynomregressionen sehr hohe Grade (z.B. d=15) zu verwenden?", o: ["Weil sie nicht mehr per OLS geschätzt werden können.", "Wegen extremer Oszillationen und heftigem Overfitting, besonders an den Rändern des Datenbereichs.", "Weil der Bias dadurch unkontrollierbar steigt.", "Weil das Modell dann nicht mehr additiv ist."], c: 1, e: "Polynome hohen Grades sind global sehr instabil. Ein kleiner Ausreißer ändert die Kurve überall. Daher sind z.B. Splines (stückweise Polynome) vorzuziehen." },

    { t: 't7', d: 2, q: "Was besagt das Hierarchische Prinzip bei Interaktionstermen (X1 × X2)?", o: ["Die Interaktion darf nur aufgenommen werden, wenn sie nicht-linear transformiert wird.", "Wenn die Interaktion im Modell ist, müssen auch die Haupteffekte X1 und X2 im Modell bleiben, selbst wenn ihre individuellen p-Werte nicht signifikant sind.", "Haupteffekte müssen hierarchisch vor Interaktionen gelöscht werden.", "Qualitative Variablen dürfen nicht interagieren."], c: 1, e: "Das Entfernen der Haupteffekte würde die Bedeutung des Interaktionsterms verändern und die Interpretation massiv erschweren." },
    { t: 't7', d: 3, q: "Wie unterscheiden sich ein 'Outlier' und ein 'High Leverage Point'?", o: ["Es gibt keinen Unterschied.", "Outlier haben extreme X-Werte, Leverage Points haben extreme Y-Werte.", "Ein Outlier hat einen unüblichen Y-Wert (hohes Residuum). Ein High Leverage Point hat einen unüblichen X-Wert (zieht die Gerade an sich).", "Leverage Points können nur bei nicht-linearen Modellen auftreten."], c: 2, e: "Ein Outlier mit niedrigem Leverage ändert die Modellkoeffizienten kaum, verschlechtert aber den RSE. Ein Leverage-Punkt hat einen massiven 'Hebelarm' auf die Steigung." },

    { t: 't8', d: 2, q: "Warum wird die k-Fold Cross-Validation (mit z.B. k=10) oft der LOOCV (Leave-One-Out) vorgezogen?", o: ["LOOCV hat einen zu hohen Bias.", "k-Fold hat eine geringere Varianz in der Schätzung des Testfehlers und ist viel recheneffizienter.", "LOOCV kann nicht auf Klassifikationsprobleme angewendet werden.", "k-Fold interpoliert die Trainingsdaten besser."], c: 1, e: "LOOCV mittelt über fast identische Trainingssets. Da diese extrem positiv korreliert sind, hat der Mittelwert (die LOOCV-Schätzung) eine höhere Varianz. k-Fold bietet einen besseren Bias-Varianz-Kompromiss." },

    { t: 't9', d: 3, q: "Wie groß ist bei großen n näherungsweise die Wahrscheinlichkeit, dass eine bestimmte Original-Beobachtung NICHT in einer speziellen Bootstrap-Stichprobe (Größe n, mit Zurücklegen) landet?", o: ["ca. 50%", "ca. 5%", "ca. 36.8% (entspricht 1/e)", "ca. 63.2%"], c: 2, e: "Die Wkt., in einem Zug nicht gezogen zu werden, ist (1 - 1/n). Bei n Zügen ist es (1 - 1/n)^n. Für n gegen unendlich konvergiert das gegen 1/e ≈ 0.368. Folglich enthält ein Bootstrap-Sample nur ca. 63.2% distinkte Originaldaten." },

    { t: 't10', d: 2, q: "Warum ist das R² auf Trainingsdaten wertlos, wenn p >= n (Hochdimensional)?", o: ["Weil p-Werte dann immer 0 sind.", "Weil OLS in diesem Fall immer den Rausch der Daten perfekt auswendig lernt (R²=1), was zu totalem Overfitting und schlechter Generalisierung führt.", "Weil die Matrix dann invertierbar wird.", "Weil die F-Statistik dann asymptotisch gegen Null geht."], c: 1, e: "Wenn man mehr Parameter als Datenpunkte hat, gibt es unendlich viele Hyperebenen, die den Trainingsfehler exakt auf Null bringen. Das Modell merkt sich das Rauschen." },

    { t: 't11', d: 2, q: "Welches mathematische Feature der Lasso-Regression führt dazu, dass sie Variablen 'selektiert' (Koeffizienten exakt auf Null setzt)?", o: ["Die quadrierte L2-Norm Strafe.", "Der L1-Strafterm bildet einen Restriktionsraum mit spitzen Ecken (z.B. eine Raute), an denen die OLS-Konturen oft zuerst anliegen.", "Lasso invertiert die Korrelationsmatrix.", "Lasso nutzt den Gini-Index."], c: 1, e: "Ridge (L2) hat einen kreisförmigen Restriktionsraum, die Ellipsen der Fehlerfunktion berühren diesen fast nie auf den Achsen. Lasso (L1) hat Ecken auf den Achsen; wird dort berührt, ist der Koeffizient exakt 0." },
    { t: 't11', d: 3, q: "Was muss zwingend mit den Prädiktoren X geschehen, BEVOR eine Ridge- oder Lasso-Regression durchgeführt wird?", o: ["Sie müssen quadriert werden.", "Sie müssen logarithmiert werden.", "Sie müssen standardisiert werden (Mittelwert 0, Varianz 1), da der Shrinkage-Penalty sonst skalenabhängig extrem verzerrt.", "Sie müssen in Dummy-Variablen überführt werden."], c: 2, e: "Da die Penalty-Terme (z.B. beta²) die Koeffizienten summieren, würde eine Variable, die in kleinen Einheiten (Milliarden vs. Promille) gemessen wird, unproportional stark bestraft, nur weil ihr Koeffizient numerisch groß sein muss." }
  ],
  flashcards: [
    { t: 't1', q: "Was unterscheidet Supervised von Unsupervised Learning?", a: "Supervised hat eine Zielvariable Y (Labels), Unsupervised sucht nur nach Strukturen in den Features X (z.B. Clustering, PCA)." },
    { t: 't2', q: "Was ist der Irreducible Error?", a: "Var(ε). Die immanente Streuung des Fehlers in der Natur. Die harte Untergrenze für den Test-MSE, die nie unterschritten werden kann." },
    { t: 't3', q: "Wieso eignet sich lineare Regression oft nicht für Klassifikation?", a: "Sie kann Werte >1 oder <0 ausgeben, die als Wahrscheinlichkeiten sinnlos sind. Bei k>2 maskiert eine numerische (1,2,3) Codierung die Abstände zwischen Kategorien (Dummy Variable Trap ignorierend)." },
    { t: 't4', q: "Was gibt der RSE (Residual Standard Error) an?", a: "Er schätzt die Standardabweichung des Fehlerterms ε. Er gibt grob an, um wie viel die Vorhersage im Schnitt vom wahren Wert abweicht (absolutes Maß)." },
    { t: 't5', q: "Wie interpretiert man β_j in der Multiplen Lin. Reg.?", a: "Als die durchschnittliche Änderung in Y bei Erhöhung von X_j um eine Einheit, VORAUSGESETZT alle anderen Prädiktoren bleiben konstant (ceteris paribus)." },
    { t: 't6', q: "Wie codiert man eine kategoriale Variable mit 4 Levels?", a: "Mit ex
